classes:
  - class: "Hf14aCmd"
    count: 9
    methods:
      - name: "search"
        command: "hf 14a reader"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-k, --keep                     在命令执行后保持天线场激活"
          - "-s, --silent                   静默（无消息）"
          - "--drop                         仅放下信号场"
          - "--skip                         仅 ISO14443-3 选择（跳过 RATS）"
          - "-w, --wait                     等待卡片"
        help_source: "-o -c hf 14a reader -h"
      - name: "info"
        command: "hf 14a info"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-v, --verbose                  详细输出信息"
          - "-n, --nacktest                 测试 nack 错误"
          - "-s, --aidsearch                检查 aidlist.json 中的 AID 是否存在于卡片并打印找到的 AID 信息"
        help_source: "-o -c hf 14a info -h"
      - name: "sniff"
        command: "hf 14a sniff"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-c, --card                     由卡片的第一条数据触发"
          - "-r, --reader                   由读卡器的第一条 7 位请求触发（REQ, WUP）"
          - "-i, --interactive              交互式模式：嗅探完成或中止前不返回控制台"
        help_source: "-o -c hf 14a sniff -h"
      - name: "apdu"
        command: "hf 14a apdu"
        description: "用法："
        params:
          - "-m <CLA INS P1 P2> -d 325041592E5359532E4444463031"
          - "-d 00A404000E325041592E5359532E444446303100"
          - "-h, --help                     帮助信息"
          - "-s, --select                   激活场并选择卡片"
          - "-k, --keep                     接收后保持信号场开启"
          - "-t, --tlv                      解码 TLV"
          - "--decode                       解码 APDU 请求"
          - "-m, --make <hex>               APDU 头，4 字节 <CLA INS P1 P2>"
          - "-e, --extended                 如果包含 `m` 参数则制作扩展长度 APDU"
          - "-l, --le <dec>                 如果包含 `m` 参数，则为 Le APDU 参数（十进制）"
          - "-d, --data <hex>               完整 APDU 包或在包含 `m` 时的数据（十六进制）"
        help_source: "-o -c hf 14a apdu -h"
      - name: "config"
        command: "hf 14a config"
        description: ""
        params:
          []
        help_source: "not found"
      - name: "cuids"
        command: "hf 14a cuids"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-n, --num <dec>                要收集的 UID 数量"
        help_source: "-o -c hf 14a cuids -h"
      - name: "ndefRead"
        command: "hf 14a ndefread"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-f, --file <fn>                将原始 NDEF 保存到文件"
          - "-v, --verbose                  详细输出信息"
        help_source: "-o -c hf 14a ndefread -h"
      - name: "raw"
        command: "hf 14a raw"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-a                             在未选择的情况下打开活动信号场"
          - "-c                             计算并附加 CRC"
          - "-k                             接收后保持信号场开启"
          - "-3                             仅 ISO14443-3 选择（跳过 RATS）"
          - "-r                             不读取响应"
          - "-s                             带选择地打开活动信号场"
          - "-t, --timeout <ms>             超时（毫秒）"
          - "-b <dec>                       要发送的比特数。用于发送部分字节"
          - "-v, --verbose                  详细输出信息"
          - "-w, --wait <us>                在选择和命令之间等待的微秒数"
          - "--topaz                        使用 Topaz 协议发送命令"
          - "--crypto1                      使用 Crypto1 会话"
          - "--schann                       使用安全通道。必须有密钥"
        help_source: "-o -c hf 14a raw -h"
      - name: "sim"
        command: "hf 14a sim"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-t, --type <1-15>              要使用的模拟类型"
          - "-u, --uid <hex>                <4|7|10> 字节十六进制 UID"
          - "-n, --num <dec>                在阅读器读取 <numreads> 个块后退出模拟。0 = 无限"
          - "-x                             执行“读卡器攻击”，nr/ar 对读卡器的攻击"
          - "--sk                           从找到的密钥填充模拟器密钥"
          - "-v, --verbose                  详细输出信息"
          - "--1a1 <hex>                    <8|16> 字节十六进制 ULC/ULAES 认证回复步骤1: ek(RndB)"
          - "--1a2 <hex>                    <8|16> 字节十六进制 ULC/ULAES 认证回复步骤2: ek(RndA')"
        help_source: "-o -c hf 14a sim -h"
  - class: "Hf14bCmd"
    count: 9
    methods:
      - name: "reader"
        command: "hf 14b reader"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "--plot                         在绘图窗口显示防冲突信号轨迹"
          - "-v, --verbose                  详细输出信息"
        help_source: "-o -c hf 14b reader -h"
      - name: "info"
        command: "hf 14b info"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-s, --aidsearch                检查 aidlist.json 中的 AID 是否存在于卡片并打印找到的 AID 信息"
          - "-v, --verbose                  详细输出信息"
        help_source: "-o -c hf 14b info -h"
      - name: "sniff"
        command: "hf 14b sniff"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
        help_source: "-o -c hf 14b sniff -h"
      - name: "dump"
        command: "hf 14b dump"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-f, --file <fn>                （可选）文件名，如果不提供则使用 UID 作为文件名"
          - "--ns                           不保存到文件"
          - "-z, --dense                    密集转储输出样式"
        help_source: "-o -c hf 14b dump -h"
      - name: "rdbl"
        command: "hf 14b rdbl"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-b, --block <dec>              块号"
        help_source: "-o -c hf 14b rdbl -h"
      - name: "wrbl"
        command: "hf 14b wrbl"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-b, --block <dec>              块号"
          - "-d, --data <hex>               4 字节十六进制数据"
          - "--512                          目标 SRI 512 标签"
          - "--4k                           目标 SRIX 4k 标签（默认）"
          - "--sb                           在内存末尾进行特殊块写入（0xFF）"
          - "--force                        覆盖块范围检查"
        help_source: "-o -c hf 14b wrbl -h"
      - name: "raw"
        command: "hf 14b raw"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-a                             活动信号场开启但不选择"
          - "-c, --crc                      计算并附加 CRC"
          - "-k, --keep                     接收后保持信号场开启"
          - "-d, --data <hex>               要发送的数据字节"
          - "-r                             不读取卡的响应"
          - "-t, --timeout <dec>            超时（毫秒）"
          - "-s, --std                      使用 ISO14B 选择"
          - "--sr                           使用 SRx ST 选择"
          - "--cts                          使用 ASK C-ticket 选择"
          - "--xrx                          使用 Fuji/Xerox 选择"
          - "--pico                         使用 Picopass 选择"
          - "-v, --verbose                  详细输出信息"
        help_source: "-o -c hf 14b raw -h"
      - name: "sim"
        command: "hf 14b sim"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-u, --uid hex                  4 字节 UID/PUPI"
        help_source: "-o -c hf 14b sim -h"
      - name: "ndefRead"
        command: "hf 14b ndefread"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-f, --file <fn>                将原始 NDEF 保存到文件"
          - "-v, --verbose                  详细输出信息"
        help_source: "-o -c hf 14b ndefread -h"
  - class: "HfMfCmd"
    count: 56
    methods:
      - name: "info"
        command: "hf mf info"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "--blk <dec>                    块号"
          - "-a                             输入密钥类型为 Key A（默认）"
          - "-b                             输入密钥类型为 Key B"
          - "-k, --key <hex>                密钥，6 字节十六进制"
          - "-n, --nack                     进行 nack 测试"
          - "-v, --verbose                  详细输出信息"
        help_source: "-o -c hf mf info -h"
      - name: "search"
        command: "hf 14a reader"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-k, --keep                     在命令执行后保持天线场激活"
          - "-s, --silent                   静默（无消息）"
          - "--drop                         仅放下信号场"
          - "--skip                         仅 ISO14443-3 选择（跳过 RATS）"
          - "-w, --wait                     等待卡片"
        help_source: "-o -c hf 14a reader -h"
      - name: "mad"
        command: "hf mf mad"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-v, --verbose                  详细输出信息"
          - "--aid <hex>                    打印包含指定 AID 的所有扇区"
          - "-k, --key <hex>                打印扇区时使用的密钥"
          - "-b, --keyb                     打印扇区时使用 Key B（默认使用 Key A）"
          - "--be                           （可选，大端字节序）"
          - "--dch                          解码卡持有人信息"
          - "-f, --file <fn>                加载转储文件并解码 MAD"
          - "--force                        强制解码（跳过密钥检查）"
        help_source: "-o -c hf mf mad -h"
      - name: "acl"
        command: "hf mf acl"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-d, --data <hex>               以 3 字节十六进制指定的 ACL 字节"
        help_source: "-o -c hf mf acl -h"
      - name: "isen"
        command: "hf mf isen"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "--blk <dec>                    块号"
          - "-a                             输入密钥类型为 Key A（默认）"
          - "-b                             输入密钥类型为 Key B"
          - "-c <dec>                       输入密钥类型为 Key A + 偏移"
          - "-k, --key <hex>                密钥，6 字节十六进制"
          - "--blk2 <dec>                   嵌套块号（默认=相同）"
          - "--a2                           嵌套输入密钥类型为 A（默认=相同）"
          - "--b2                           嵌套输入密钥类型为 B（默认=相同）"
          - "--c2 <dec>                     嵌套输入密钥类型为 A + 偏移"
          - "--key2 <hex>                   嵌套密钥，6 字节十六进制（默认=相同）"
          - "-n <dec>                       随机数数量（默认=2）"
          - "--reset                        即使认证成功也在尝试之间重置"
          - "--hardreset                    即使认证成功也在尝试之间进行硬重置（射频断开/开启）"
          - "--addread                      auth(blk)-read(blk)-auth(blk2)"
          - "--addauth                      auth(blk)-auth(blk)-auth(blk2)"
          - "--incblk2                      auth(blk)-auth(blk2)-auth(blk2+4)-..."
          - "--corruptnrar                  损坏 {nR}{aR}，但校验位正确"
          - "--corruptnrarparity            校验 {nR}{aR} 正确，但修改了校验位"
          - "--collect_fm11rf08s            收集所有 nT/{nT}/par_err"
          - "--collect_fm11rf08s_with_data  收集所有 nT/{nT}/par_err 和数据块"
          - "--collect_fm11rf08s_without_backdoor 收集所有 nT/{nT}/par_err（不含后门）。需要第一个认证的密钥类型和块"
          - "-f, --file <fn>                为收集的数据指定文件名"
        help_source: "-o -c hf mf isen -h"
      - name: "autopwn"
        command: "hf mf autopwn"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-k, --key <hex>                已知密钥，12 字节十六进制"
          - "-s, --sector <dec>             输入扇区号"
          - "-a                             输入 Key A（默认）"
          - "-b                             输入 Key B"
          - "-f, --file <fn>                字典文件名"
          - "--suffix <txt>                 为生成的文件添加后缀"
          - "--slow                         较慢的采集（某些非标准卡需要）"
          - "-l, --legacy                   兼容模式（使用较慢的 `hf mf chk`）"
          - "-v, --verbose                  详细输出信息"
          - "--mem                          使用闪存中的字典"
          - "--ns                           不保存到文件"
          - "--mini                         MIFARE Classic Mini / S20"
          - "--1k                           MIFARE Classic 1k / S50（默认）"
          - "--2k                           MIFARE Classic/Plus 2k"
          - "--4k                           MIFARE Classic 4k / S70"
          - "--in                           无（使用 CPU 常规指令集）"
          - "--im                           MMX"
          - "--is                           SSE2"
          - "--ia                           AVX"
          - "--i2                           AVX2"
          - "--i5                           AVX512"
        help_source: "-o -c hf mf autopwn -h"
      - name: "chk"
        command: "hf mf chk"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-k, --key <hex>                以 12 个十六进制符号指定的密钥"
          - "--tblk <dec>                   目标块号"
          - "-a                             目标 Key A"
          - "-b                             目标 Key B"
          - "--mini                         MIFARE Classic Mini / S20"
          - "--1k                           MIFARE Classic 1k / S50（默认）"
          - "--2k                           MIFARE Classic/Plus 2k"
          - "--4k                           MIFARE Classic 4k / S70"
          - "--emu                          将找到的密钥填入模拟器"
          - "--dump                         将找到的密钥转储到二进制文件"
          - "-f, --file <fn>                字典文件名"
          - "--no-default                   跳过默认密钥检查"
        help_source: "-o -c hf mf chk -h"
      - name: "fchk"
        command: "hf mf fchk"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-k, --key <hex>                以 12 个十六进制符号指定的密钥"
          - "--mini                         MIFARE Classic Mini / S20"
          - "--1k                           MIFARE Classic 1k / S50（默认）"
          - "--2k                           MIFARE Classic/Plus 2k"
          - "--4k                           MIFARE Classic 4k / S70"
          - "--emu                          将找到的密钥填入模拟器"
          - "--dump                         将找到的密钥转储到二进制文件"
          - "--mem                          使用闪存中的字典"
          - "-f, --file <fn>                字典文件名"
          - "--blk <dec>                    块号（单块恢复模式）"
          - "-a                             单块恢复 Key A"
          - "-b                             单块恢复 Key B"
          - "--no-default                   跳过默认密钥检查"
        help_source: "-o -c hf mf fchk -h"
      - name: "darkside"
        command: "hf mf darkside"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "--blk <dec>                    目标块"
          - "-b                             使用目标 Key B 而不是默认 Key A"
          - "-c <dec>                       目标密钥类型为 Key A + 偏移"
        help_source: "-o -c hf mf darkside -h"
      - name: "nested"
        command: "hf mf nested"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-k, --key <hex>                以 12 个十六进制符号指定的密钥"
          - "--mini                         MIFARE Classic Mini / S20"
          - "--1k                           MIFARE Classic 1k / S50"
          - "--2k                           MIFARE Classic/Plus 2k"
          - "--4k                           MIFARE Classic 4k / S70"
          - "--blk <dec>                    输入块号"
          - "-a                             输入密钥指定为 Key A（默认）"
          - "-b                             输入密钥指定为 Key B"
          - "-c <dec>                       输入密钥类型为 Key A + 偏移"
          - "--tblk <dec>                   目标块号"
          - "--ta                           目标 Key A（默认）"
          - "--tb                           目标 Key B"
          - "--tc <dec>                     嵌套输入密钥类型为 Key A + 偏移（必须同时指定单个块！）"
          - "--emu                          将找到的密钥填入模拟器"
          - "--dump                         将找到的密钥转储到文件"
          - "--mem                          使用闪存中的字典"
          - "-i                             忽略静态加密随机数"
        help_source: "-o -c hf mf nested -h"
      - name: "staticNested"
        command: "hf mf staticnested"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-k, --key <hex>                已知密钥（12 个十六进制符号）"
          - "--mini                         MIFARE Classic Mini / S20"
          - "--1k                           MIFARE Classic 1k / S50（默认）"
          - "--2k                           MIFARE Classic/Plus 2k"
          - "--4k                           MIFARE Classic 4k / S70"
          - "--blk <dec>                    输入块号"
          - "-a                             输入密钥指定为 Key A（默认）"
          - "-b                             输入密钥指定为 Key B"
          - "-e, --emukeys                  将找到的密钥填入模拟器密钥"
          - "--dumpkeys                     将找到的密钥转储到文件"
        help_source: "-o -c hf mf staticnested -h"
      - name: "hardnested"
        command: "hf mf hardnested"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-k, --key <hex>                密钥，12 字节十六进制"
          - "--blk <dec>                    输入块号"
          - "-a                             输入 Key A（默认）"
          - "-b                             输入 Key B"
          - "--tblk <dec>                   目标块号"
          - "--ta                           目标 Key A"
          - "--tb                           目标 Key B"
          - "--tk <hex>                     目标密钥，12 字节十六进制"
          - "-u, --uid <hex>                读取/写入 `hf-mf-<UID>-nonces.bin` 而不是默认名"
          - "-f, --file <fn>                读取/写入 <name> 而不是默认名"
          - "-r, --read                     如果标签存在则读取 `hf-mf-<UID>-nonces.bin`，否则读取 `nonces.bin` 并开始攻击"
          - "-s, --slow                     较慢的采集（某些非标准卡需要）"
          - "-t, --tests                    运行测试"
          - "-w, --wr                       获取随机数和 UID，并将其写入文件 `hf-mf-<UID>-nonces.bin`"
          - "--in                           无（使用 CPU 常规指令集）"
          - "--im                           MMX"
          - "--is                           SSE2"
          - "--ia                           AVX"
          - "--i2                           AVX2"
          - "--i5                           AVX512"
        help_source: "-o -c hf mf hardnested -h"
      - name: "nack"
        command: "hf mf nack"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-v, --verbose                  详细输出信息"
        help_source: "-o -c hf mf nack -h"
      - name: "brute"
        command: "hf mf brute"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "--mini                         MIFARE Classic Mini / S20"
          - "--1k                           MIFARE Classic 1k / S50（默认）"
          - "--2k                           MIFARE Classic/Plus 2k"
          - "--4k                           MIFARE Classic 4k / S70"
          - "--emu                          将找到的密钥填入模拟器"
          - "--dump                         将找到的密钥转储到二进制文件"
        help_source: "-o -c hf mf brute -h"
      - name: "decrypt"
        command: "hf mf decrypt"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "--nt <hex>                     标签随机数"
          - "--ar <hex>                     ar_enc，加密的读卡器响应"
          - "--at <hex>                     at_enc，加密的标签响应"
          - "-d, --data <hex>               加密数据，紧随 at_enc 之后取出"
        help_source: "-o -c hf mf decrypt -h"
      - name: "supercard"
        command: "hf mf supercard"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "-r, --reset                    重置卡片"
          - "-u, --uid <hex>                新 UID（4 字节十六进制）"
          - "--furui                        Furui 检测卡"
        help_source: "-o -c hf mf supercard -h"
      - name: "rdbl"
        command: "hf mf rdbl"
        description: "用法："
        params:
          - "-h, --help                     帮助信息"
          - "--blk <dec>                    块号"
