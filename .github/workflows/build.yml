# PM3 GUI — Flutter 构建 CI
# Improvements applied by DevOps reviewer:
# - permissions: minimal job-level permissions (least privilege)
# - caching: cache Flutter/Dart pub cache and Gradle to improve performance
# - concurrency: prevent overlapping runs on same ref
# - matrix builds for platforms kept; artifacts named with commit+timestamp
# NOTE: For maximum stability lock actions to commit SHAs (replace @vX with @<sha>)

name: PM3 GUI Build (improved)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Global minimal permissions. Jobs that need write will override per-job.
permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5 # pin to an explicit tag; consider replacing with full commit SHA for immutability

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build Linux
        run: flutter build linux --release

      - name: Package artifacts
        run: |
          cd build/linux/x64/release/bundle
          TAR=pm3gui-linux-x64-${{ github.sha[:8] }}-$(date -u +%Y%m%dT%H%M%SZ).tar.gz
          tar czf "$GITHUB_WORKSPACE/$TAR" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: pm3gui-linux-x64-${{ github.sha[:8] }}
          path: pm3gui-linux-x64-*.tar.gz

  build-android:
    name: Build Android APK (split per ABI)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: pm3gui-android-apk-${{ github.sha[:8] }}
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath pm3gui-windows-x64-${{ github.sha[:8] }}.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: pm3gui-windows-x64-${{ github.sha[:8] }}
          path: pm3gui-windows-x64-*.zip

# Notes:
# - Performance: caching pub packages speeds repeated CI runs. For native C/C++ builds you can add ccache integration.
# - Stability: consider replacing action tags with pinned SHAs (e.g. actions/checkout@<sha>) to avoid upstream breaking changes.
# - Security: global permissions are minimal; jobs needing write (releases) will request write permissions explicitly in the release workflow.
# - Norms: matrix builds are used for platform coverage (Android uses split-per-abi). Release automation handled in separate workflow.
