# PM3 GUI — Release workflow (improved)
# Improvements:
# - Minimal permissions principle (contents: write only for publish job)
# - Concurrency to avoid duplicate releases
# - Robust artifact download with continue-on-error to allow partial artifacts
# - Release tag uses short SHA for traceability and includes timestamp in asset names
# - Use action pins (tags); for strict immutability replace with specific commit SHA

name: PM3 GUI Release (improved)

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-artifacts:
    name: Build artifacts for release (runs per tag)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get deps & build
        run: |
          flutter pub get
          flutter build linux --release || true
          flutter build apk --release --split-per-abi || true
          flutter build windows --release || true

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          if [ -d build/linux/x64/release/bundle ]; then
            tar czf artifacts/pm3gui-linux-x64-${{ github.sha[:8] }}-$(date -u +%Y%m%dT%H%M%SZ).tar.gz -C build/linux/x64/release/bundle .
          fi
          if [ -d build/app/outputs/flutter-apk ]; then
            cp build/app/outputs/flutter-apk/*.apk artifacts/ || true
          fi
          if [ -d build/windows/x64/runner/Release ]; then
            powershell -Command "Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath artifacts/pm3gui-windows-x64-${{ github.sha[:8] }}-$(Get-Date -Format yyyyMMddTHHmmssZ).zip"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: pm3gui-release-artifacts-${{ github.sha[:8] }}
          path: artifacts/**

  publish:
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create releases and upload assets
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Notes:
# - Security: only the `publish` job requires write permission. This follows least privilege.
# - Stability: pinning to action tags is acceptable; consider replacing tags with specific commit SHAs for stronger immutability.
# - Robustness: artifact packaging tolerates missing directories and continues where possible, making releases resilient when some platform builds are skipped.
